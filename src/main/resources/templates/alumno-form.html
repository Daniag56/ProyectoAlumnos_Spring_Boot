<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Alumno</title>
</head>
<body>

<h1>Registrar Nuevo Alumno</h1>

<form th:action="@{/alumnos/guardar}" th:object="${alumno}" method="post">

    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" required><br><br>

    <label>Apellidos:</label>
    <input type="text" th:field="*{apellidos}" required><br><br>

    <label>Email:</label>
    <input type="email" th:field="*{email}" required><br><br>

    <label>Fecha de nacimiento:</label>
    <input type="date" th:field="*{fechaNacimiento}"><br><br>

    <label>Curso:</label>
    <select th:field="*{curso.id}">
        <option th:each="c : ${cursos}" th:value="${c.id}" th:text="${c.nombre}"></option>
    </select><br><br>

    <button type="submit">Guardar</button>
</form>

</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Profesor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .contenedor {
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1f4e79;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #1f4e79;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background: #163a5c;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Editar Profesor</h1>

    <form th:action="@{'/profesores/editar/' + ${profesor.id}}" th:object="${profesor}" method="post">

        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}" required>

        <label>Email:</label>
        <input type="email" th:field="*{email}" required>

        <label>Departamento:</label>
        <input type="text" th:field="*{departamento}">

        <button type="submit">Guardar Cambios</button>
    </form>
</div>

</body>
</html>
